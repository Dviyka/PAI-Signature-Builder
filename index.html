<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAI Email Signature Builder</title>
  <link rel="icon" type="image/png" href="assets/Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gray-50:  #f9f9f9;
      --gray-100: #f2f2f2;
      --gray-200: #e5e5e5;
      --gray-400: #a0a0a0;
      --gray-600: #666666;
      --green:    #3BB477;
      --content-max-width: 1280px;
      --content-pad-x: 40px;
      --sidebar-width: 340px;
      --layout-gap: 28px;
      --header-top: 28px;
      --header-height: 64px;
      --header-gap: 28px;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--gray-100);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: var(--header-top);
      left: 50%;
      width: min(var(--content-max-width), calc(100vw - (var(--content-pad-x) * 2)));
      transform: translateX(-50%);
      height: var(--header-height);
      background: var(--black);
      color: var(--white);
      padding: 0 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo img,
    .header-logo svg { width: auto; height: 32px; display: block; }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .container {
      max-width: var(--content-max-width);
      margin: 0 auto;
      padding: calc(var(--header-top) + var(--header-height) + var(--header-gap)) 0 36px;
    }

    .tabs {
      display: flex;
      gap: 3px;
      margin-bottom: 20px;
      background: var(--gray-200);
      padding: 3px;
      border-radius: 8px;
      width: 100%;
    }
    .tab {
      flex: 1;
      padding: 9px 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 6px;
      color: var(--gray-600);
      transition: all 0.15s;
    }
    .tab.active { background: var(--black); color: var(--white); }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      gap: var(--layout-gap);
      align-items: start;
    }

    /* ── Form Panel ── */
    .form-panel {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 28px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 14px;
    }
    .form-section { margin-bottom: 24px; }
    .form-section:last-child { margin-bottom: 0; }
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 5px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="url"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--black);
      outline: none;
      transition: border-color 0.15s;
      background: var(--white);
    }
    input:focus { border-color: var(--black); }
    input::placeholder { color: var(--gray-400); }

    .divider { height: 1px; background: var(--gray-200); margin: 22px 0; }

    /* Photo upload */
    .photo-upload {
      border: 1.5px dashed var(--gray-200);
      border-radius: 8px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .photo-upload:hover { border-color: var(--black); }
    .photo-upload input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .photo-thumb {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      object-fit: cover;
      display: none;
      margin: 0 auto 8px;
    }
    .photo-hint {
      font-size: 12px;
      color: var(--gray-400);
      line-height: 1.5;
    }
    .photo-hint strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 2px;
    }
    .photo-upload.dragover { border-color: var(--black); background: var(--gray-50); }
    .url-toggle {
      display: block;
      margin-top: 8px;
      background: none;
      border: none;
      padding: 0;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--gray-400);
      cursor: pointer;
      text-decoration: underline;
    }
    .url-toggle:hover { color: var(--black); }

    /* ── Preview Panel ── */
    .preview-panel {
      position: fixed;
      top: calc(var(--header-top) + var(--header-height) + var(--header-gap));
      left: calc((100vw - min(var(--content-max-width), 100vw)) / 2 + var(--sidebar-width) + var(--layout-gap));
      width: calc(min(var(--content-max-width), 100vw) - var(--sidebar-width) - var(--layout-gap));
    }
    .preview-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 14px;
    }
    .preview-box {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 28px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
    }
    .preview-content {
      padding: 0;
      overflow-x: auto;
      min-height: 140px;
    }
    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 40px;
      padding: 14px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #222; }
    .copy-btn.success { background: var(--green); }
    .copy-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .made-by-wrap {
      position: fixed;
      left: 50%;
      bottom: 28px;
      width: min(var(--content-max-width), calc(100vw - (var(--content-pad-x) * 2)));
      transform: translateX(-50%);
      display: flex;
      justify-content: flex-end;
      pointer-events: none;
      z-index: 900;
    }
    .made-by-link {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #000;
    }
    .made-by-text {
      font-family: Arial, Helvetica;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.3);
      line-height: 1;
    }
    .made-by-logo {
      display: block;
      height: 24px;
      width: auto;
      opacity: 0.3;
      transition: opacity 0.15s ease;
    }
    .made-by-link:hover .made-by-logo { opacity: 1; }

    /* ── Signature preview styles (matches Figma) ── */
    .sig-wrap { display: inline-block; }

    /* Public */
    .sig-public {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .sig-photo {
      width: 140px;
      height: 140px;
      border-radius: 1px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }
    .sig-photo-placeholder {
      width: 140px;
      height: 140px;
      background: #d9d9d9;
      border-radius: 1px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .sig-text {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 140px;
    }
    .sig-name-block { display: flex; flex-direction: column; gap: 4px; }
    .sig-name-row {
      font-family: Arial, Helvetica;
      font-size: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: -0.8px;
      color: #000;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      line-height: 1;
    }
    .sig-position {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      letter-spacing: -0.4px;
      color: #000;
      line-height: 1;
    }
    .sig-contacts {
      display: flex;
      gap: 40px;
      align-items: stretch;
    }
    .sig-personal {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 92px;
    }
    .sig-links { display: flex; flex-direction: column; gap: 4px; }
    .sig-links a,
    .sig-social-col a {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: #000;
      text-decoration: underline;
      letter-spacing: -0.3px;
      line-height: 16px;
      display: block;
    }
    .sig-logo { display: block; }
    .sig-logo img { height: 40px; width: 158px; display: block; }
    .sig-company-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sig-company-col > a {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: #000;
      text-decoration: underline;
      letter-spacing: -0.3px;
      line-height: 16px;
    }
    .sig-social-col { display: flex; flex-direction: column; gap: 4px; }
    .sig-social-col a.empty-link { display: none; }

    /* Inner */
    .sig-inner {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .sig-inner .sig-name-row {
      font-size: 20px;
      letter-spacing: -0.8px;
    }
    .sig-vector img { width: 97px; height: 48px; display: block; }
    .sig-inner-text { display: flex; flex-direction: column; justify-content: center; gap: 4px; }
    .sig-inner-contacts {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .sig-inner-contacts span {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      color: #000;
      letter-spacing: -0.8px;
      line-height: 24px;
    }
    .sig-inner-contacts a {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      color: #000;
      letter-spacing: -0.8px;
      line-height: 24px;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="assets/PAI_Logo_Big-White.svg" alt="PAI">
    <span class="header-title">Email Signature Builder</span>
  </div>
</header>

<div class="container">
  <div class="layout">

    <!-- FORM -->
    <div class="form-panel">
      <div class="tabs">
        <button class="tab active" data-tab="public">Public</button>
        <button class="tab" data-tab="inner">Inner</button>
      </div>

      <!-- PUBLIC FORM -->
      <div id="form-public">

        <div class="form-section">
          <div class="section-label">Photo</div>
          <div class="photo-upload" id="photo-drop">
            <input type="file" id="pub-photo-file" accept="image/*">
            <img class="photo-thumb" id="pub-photo-thumb" alt="">
            <div class="photo-hint">
              <strong>Додати фото</strong>
              Перетягни або клікни · мін. 180×180px
            </div>
          </div>
          <button class="url-toggle" id="url-toggle-btn">або вставити URL</button>
          <div id="url-field" style="display:none;">
            <input type="url" id="pub-photo" placeholder="https://res.cloudinary.com/…" style="margin-top:8px;">
          </div>
        </div>

        <div class="divider"></div>

        <div class="form-section">
          <div class="section-label">Identity</div>
          <div class="field">
            <label>First &amp; Last Name</label>
            <input type="text" id="pub-name" placeholder="Full Name" value="Full Name">
          </div>
          <div class="field">
            <label>Position</label>
            <input type="text" id="pub-position" placeholder="Position" value="Position">
          </div>
        </div>

        <div class="divider"></div>

        <div class="form-section">
          <div class="section-label">Contact</div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="pub-email" placeholder="hello@paidefence.com" value="hello@paidefence.com">
          </div>
          <div class="field">
            <label>Phone</label>
            <input type="tel" id="pub-phone" placeholder="+380000000000" value="+380000000000">
          </div>
          <div class="field">
            <label>Website</label>
            <input type="text" id="pub-website" placeholder="paidefence.com" value="paidefence.com">
          </div>
        </div>

        <div class="divider"></div>

        <div class="form-section">
          <div class="section-label">Social links</div>
          <div class="field">
            <label>LinkedIn URL</label>
            <input type="url" id="pub-linkedin" placeholder="https://linkedin.com/company/paidefence">
          </div>
          <div class="field">
            <label>Instagram URL</label>
            <input type="url" id="pub-instagram" placeholder="https://instagram.com/paidefence">
          </div>
          <div class="field">
            <label>Facebook URL</label>
            <input type="url" id="pub-facebook" placeholder="https://facebook.com/paidefence">
          </div>
        </div>

      </div><!-- /form-public -->

      <!-- INNER FORM -->
      <div id="form-inner" style="display:none;">

        <div class="form-section">
          <div class="section-label">Identity</div>
          <div class="field">
            <label>First &amp; Last Name</label>
            <input type="text" id="inn-name" placeholder="Name" value="Name">
          </div>
          <div class="field">
            <label>Position</label>
            <input type="text" id="inn-position" placeholder="Manager" value="Manager">
          </div>
        </div>

        <div class="divider"></div>

        <div class="form-section">
          <div class="section-label">Contact</div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="inn-email" placeholder="hello@paidefence.com" value="hello@paidefence.com">
          </div>
        </div>

      </div><!-- /form-inner -->

    </div><!-- /form-panel -->

    <!-- PREVIEW -->
    <div class="preview-panel">
      <div class="preview-box">
        <div class="preview-content" id="preview-box"></div>
        <button class="copy-btn" id="copy-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Скопіювати підпис
        </button>
      </div>
    </div>

  </div>
</div>

<div class="made-by-wrap">
  <a class="made-by-link" href="https://www.2ka.studio/" target="_blank" rel="noopener">
    <span class="made-by-text">Made By</span>
    <img class="made-by-logo" src="assets/Dviika_Logo-Big-Black.svg" alt="Dviika">
  </a>
</div>

<!-- Hidden zone for select-and-copy -->
<div id="copy-zone" style="position:fixed;left:-99999px;top:0;background:white;"></div>

/* ════════════════════════════════════════════

════════════════════════════════════════════ */
let activeTab = 'public';
let photoDataUrl = null;
const COMPANY_NAME = 'PAI Defence';
const PHOTO_MIN_SIZE = 180;
const PHOTO_OUTPUT_SIZE = 360;
const PHOTO_MAX_BYTES = 50 * 1024;
const PHOTO_START_QUALITY = 0.86;
const PHOTO_MIN_QUALITY = 0.5;

/* ════════════════════════════════════════════
   Helpers
════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const v = id => ($( id) ? $(id).value.trim() : '');
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hasScheme(value) {
  return /^[a-zA-Z][a-zA-Z\d+\-.]*:/.test(value);
}
function toHttpUrl(rawValue, allowBare = false) {
  const raw = String(rawValue || '').trim();
  if (!raw) return '';
  const candidate = allowBare && !hasScheme(raw) ? `https://${raw}` : raw;
  try {
    const parsed = new URL(candidate);
    if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
    return parsed.href;
  } catch {
    return '';
  }
}
function normalizeWebsite(rawValue) {
  const raw = String(rawValue || '').trim();
  const href = toHttpUrl(raw, true);
  const label = raw.replace(/^https?:\/\//i, '').replace(/\/$/, '');
  return { href, label };
}
function sanitizeEmail(emailValue) {
  const email = String(emailValue || '').trim();
  if (!email) return '';
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return '';
  return email;
}
function sanitizeTel(phoneValue) {
  const cleaned = String(phoneValue || '').trim().replace(/[^+\d]/g, '').replace(/(?!^)\+/g, '');
  return cleaned;
}
function toMailtoHref(emailValue) {
  const email = sanitizeEmail(emailValue);
  return email ? `mailto:${email}` : '';
}
function toTelHref(phoneValue) {
  const phone = sanitizeTel(phoneValue);
  return phone ? `tel:${phone}` : '';
}
function dataUrlSizeBytes(dataUrl) {
  const base64 = String(dataUrl || '').split(',')[1] || '';
  return Math.floor((base64.length * 3) / 4);
}
function compressToJpegDataUrl(img) {
  const canvas = document.createElement('canvas');
  canvas.width = PHOTO_OUTPUT_SIZE;
  canvas.height = PHOTO_OUTPUT_SIZE;
  const ctx = canvas.getContext('2d');
  const side = Math.min(img.width, img.height);
  const sx = (img.width - side) / 2;
  const sy = (img.height - side) / 2;
  ctx.drawImage(img, sx, sy, side, side, 0, 0, PHOTO_OUTPUT_SIZE, PHOTO_OUTPUT_SIZE);

  let quality = PHOTO_START_QUALITY;
  let dataUrl = canvas.toDataURL('image/jpeg', quality);
  while (dataUrlSizeBytes(dataUrl) > PHOTO_MAX_BYTES && quality > PHOTO_MIN_QUALITY) {
    quality = Math.max(PHOTO_MIN_QUALITY, quality - 0.08);
    dataUrl = canvas.toDataURL('image/jpeg', quality);
    if (quality === PHOTO_MIN_QUALITY) break;
  }
  return dataUrl;
}
function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.innerText || tmp.textContent || '';
}
async function copyHtmlToClipboard(html) {
  const plainText = stripHtml(html);

  if (navigator.clipboard && window.ClipboardItem) {
    try {
      const item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([plainText], { type: 'text/plain' })
      });
      await navigator.clipboard.write([item]);
      return true;
    } catch {}
  }

  const zone = $('copy-zone');
  zone.innerHTML = html;
  await new Promise(r => setTimeout(r, 80));

  const range = document.createRange();
  range.selectNodeContents(zone);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  const copied = document.execCommand('copy');
  sel.removeAllRanges();
  zone.innerHTML = '';
  return copied;
}

/* ════════════════════════════════════════════
   Tab switching
════════════════════════════════════════════ */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $('form-public').style.display = activeTab === 'public' ? '' : 'none';
    $('form-inner').style.display  = activeTab === 'inner'  ? '' : 'none';
    renderPreview();
  });
});

/* ════════════════════════════════════════════
   Photo upload
════════════════════════════════════════════ */
function handlePhotoFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      if (img.width < PHOTO_MIN_SIZE || img.height < PHOTO_MIN_SIZE) {
        alert(`Фото замале. Мінімум ${PHOTO_MIN_SIZE}×${PHOTO_MIN_SIZE}px.`);
        return;
      }
      photoDataUrl = compressToJpegDataUrl(img);
      const thumb = $('pub-photo-thumb');
      thumb.src = photoDataUrl;
      thumb.style.display = 'block';
      $('photo-drop').querySelector('.photo-hint').style.display = 'none';
      renderPreview();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

$('pub-photo-file').addEventListener('change', e => {
  handlePhotoFile(e.target.files[0]);
});

const dropZone = $('photo-drop');
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handlePhotoFile(e.dataTransfer.files[0]);
});

$('url-toggle-btn').addEventListener('click', () => {
  const field = $('url-field');
  field.style.display = field.style.display === 'none' ? '' : 'none';
});

/* ════════════════════════════════════════════
   Live preview
════════════════════════════════════════════ */
document.querySelectorAll('input').forEach(el => el.addEventListener('input', renderPreview));

$('pub-photo').addEventListener('input', () => {
  if (v('pub-photo')) {
    photoDataUrl = null;
    $('pub-photo-thumb').style.display = 'none';
    $('photo-drop').querySelector('.photo-hint').style.display = '';
  }
});

function renderPreview() {
  $('preview-box').innerHTML = activeTab === 'public' ? buildPublicPreview() : buildInnerPreview();
}

function buildPublicPreview() {
  const name     = v('pub-name')     || 'Name';
  const company  = COMPANY_NAME;
  const position = v('pub-position') || 'Position';
  const email    = v('pub-email')    || 'email@company.com';
  const phone    = v('pub-phone')    || '+000 000 000';
  const website  = v('pub-website')  || 'website.com';
  const photoUrl = photoDataUrl || toHttpUrl(v('pub-photo'));
  const linkedin = toHttpUrl(v('pub-linkedin'));
  const instagram= toHttpUrl(v('pub-instagram'));
  const facebook = toHttpUrl(v('pub-facebook'));
  const { href: websiteHref, label: websiteLabel } = normalizeWebsite(website);
  const emailHref = toMailtoHref(email);
  const phoneHref = toTelHref(phone);

  const photo = photoUrl
    ? `<img src="${esc(photoUrl)}" class="sig-photo" alt="${esc(name)}">`
    : `<div class="sig-photo-placeholder">Photo</div>`;

  const socialHtml = `
    ${linkedin  ? `<a href="${esc(linkedin)}"  target="_blank" rel="noopener">linkedin</a>`  : ''}
    ${instagram ? `<a href="${esc(instagram)}" target="_blank" rel="noopener">instagram</a>` : ''}
    ${facebook  ? `<a href="${esc(facebook)}"  target="_blank" rel="noopener">facebook</a>`  : ''}
  `;

  return `
  <div class="sig-wrap">
    <div class="sig-public">
      ${photo}
      <div class="sig-text">
        <div class="sig-name-block">
          <div class="sig-name-row">
            <span>${esc(name)}</span>
            <span>| ${esc(company)}</span>
          </div>
          <div class="sig-position">${esc(position)}</div>
        </div>
        <div class="sig-contacts">
          <div class="sig-personal">
            <div class="sig-links">
              <a href="${esc(emailHref || '#')}">${esc(email)}</a>
              <a href="${esc(phoneHref || '#')}">${esc(phone)}</a>
            </div>
            <div class="sig-logo">
              <img src="${LOGO_PNG}" alt="PAI Defence" style="height:40px;width:158px;display:block;">
            </div>
          </div>
          <div class="sig-company-col">
            <a href="${esc(websiteHref || '#')}" target="_blank" rel="noopener">${esc(websiteLabel || website)}</a>
            <div class="sig-social-col">${socialHtml}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildInnerPreview() {
  const name     = v('inn-name')     || 'Name';
  const company  = COMPANY_NAME;
  const position = v('inn-position') || 'Position';
  const email    = v('inn-email')    || 'email@company.com';
  const emailHref = toMailtoHref(email);

  return `
  <div class="sig-wrap">
    <div class="sig-inner">
      <div class="sig-vector">
        <img src="${VECTOR_PNG}" alt="PAI">
      </div>
      <div class="sig-inner-text">
        <div class="sig-name-row">
          <span>${esc(name)}</span>
          <span>| ${esc(company)}</span>
        </div>
        <div class="sig-inner-contacts">
          <span>${esc(position)}</span>
          <a href="${esc(emailHref || '#')}">${esc(email)}</a>
        </div>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   Email HTML generation (table-based, email-safe)
════════════════════════════════════════════ */
function generatePublicHtml() {
  const name     = v('pub-name')     || '';
  const company  = COMPANY_NAME;
  const position = v('pub-position') || '';
  const email    = v('pub-email')    || '';
  const phone    = v('pub-phone')    || '';
  const website  = v('pub-website')  || '';
  const linkedin = toHttpUrl(v('pub-linkedin'));
  const instagram= toHttpUrl(v('pub-instagram'));
  const facebook = toHttpUrl(v('pub-facebook'));
  const photoUrl = photoDataUrl || toHttpUrl(v('pub-photo'));
  const { href: websiteHref, label: websiteLabel } = normalizeWebsite(website);
  const emailHref = toMailtoHref(email);
  const phoneHref = toTelHref(phone);

  const photoCell = photoUrl
    ? `<td style="padding-right:16px;vertical-align:top;"><img src="${esc(photoUrl)}" width="140" height="140" style="display:block;border-radius:1px;width:140px;height:140px;object-fit:cover;" alt="${esc(name)}"></td>`
    : `<td style="padding-right:16px;vertical-align:top;"><div style="display:inline-block;width:140px;height:140px;background:#d9d9d9;border-radius:1px;"></div></td>`;

  const socialRows = [];
  if (linkedin)  socialRows.push(`<tr><td style="padding-top:4px;"><a href="${esc(linkedin)}"  style="font-family:'Courier New',Courier,monospace;font-size:12px;color:#000000;text-decoration:underline;letter-spacing:-0.3px;line-height:16px;display:block;">linkedin</a></td></tr>`);
  if (instagram) socialRows.push(`<tr><td style="padding-top:4px;"><a href="${esc(instagram)}" style="font-family:'Courier New',Courier,monospace;font-size:12px;color:#000000;text-decoration:underline;letter-spacing:-0.3px;line-height:16px;display:block;">instagram</a></td></tr>`);
  if (facebook)  socialRows.push(`<tr><td style="padding-top:4px;"><a href="${esc(facebook)}"  style="font-family:'Courier New',Courier,monospace;font-size:12px;color:#000000;text-decoration:underline;letter-spacing:-0.3px;line-height:16px;display:block;">facebook</a></td></tr>`);

  const logoImg = `<img src="${LOGO_PNG}" width="158" height="40" alt="PAI Defence" style="display:block;width:158px;height:40px;">`;

  return `<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    ${photoCell}
    <td style="vertical-align:middle;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td style="padding-bottom:8px;line-height:1;">
            <span style="font-family:Arial,Helvetica;font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:-0.8px;color:#000000;">${esc(name)}&nbsp;|&nbsp;${esc(company)}</span>
          </td>
        </tr>
        <tr>
          <td style="padding-bottom:10px;">
            <span style="font-family:'Courier New',Courier,monospace;font-size:14px;color:#000000;letter-spacing:-0.4px;line-height:1;">${esc(position)}</span>
          </td>
        </tr>
        <tr>
          <td>
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <tr>
                <td style="vertical-align:top;padding-right:40px;">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                    <tr><td><a href="${esc(emailHref || '#')}" style="font-family:'Courier New',Courier,monospace;font-size:12px;color:#000000;text-decoration:underline;letter-spacing:-0.3px;line-height:16px;display:block;">${esc(email)}</a></td></tr>
                    <tr><td style="padding-top:4px;"><a href="${esc(phoneHref || '#')}" style="font-family:'Courier New',Courier,monospace;font-size:12px;color:#000000;text-decoration:underline;letter-spacing:-0.3px;line-height:16px;display:block;">${esc(phone)}</a></td></tr>
                    <tr><td style="padding-top:16px;">${logoImg}</td></tr>
                  </table>
                </td>
                <td style="vertical-align:top;">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                    <tr><td><a href="${esc(websiteHref || '#')}" style="font-family:'Courier New',Courier,monospace;font-size:12px;color:#000000;text-decoration:underline;letter-spacing:-0.3px;line-height:16px;display:block;">${esc(websiteLabel || website)}</a></td></tr>
                    ${socialRows.join('\n                    ')}
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>`;
}

function generateInnerHtml() {
  const name     = v('inn-name')     || '';
  const company  = COMPANY_NAME;
  const position = v('inn-position') || '';
  const email    = v('inn-email')    || '';
  const emailHref = toMailtoHref(email);

  const vectorImg = `<img src="${VECTOR_PNG}" width="97" height="48" alt="PAI" style="display:block;width:97px;height:48px;">`;

  return `<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="padding-right:16px;vertical-align:middle;">${vectorImg}</td>
    <td style="vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td style="padding-bottom:12px;line-height:1;">
            <span style="font-family:Arial,Helvetica;font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:-1.2px;color:#000000;">${esc(name)}&nbsp;|&nbsp;${esc(company)}</span>
          </td>
        </tr>
        <tr>
          <td>
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <tr>
                <td style="padding-right:32px;"><span style="font-family:'Courier New',Courier,monospace;font-size:14px;color:#000000;letter-spacing:-0.8px;line-height:24px;">${esc(position)}</span></td>
                <td><a href="${esc(emailHref || '#')}" style="font-family:'Courier New',Courier,monospace;font-size:14px;color:#000000;text-decoration:underline;letter-spacing:-0.8px;line-height:24px;">${esc(email)}</a></td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>`;
}

/* ════════════════════════════════════════════
   Copy button — select rendered HTML (зберігає форматування в Gmail)
════════════════════════════════════════════ */
$('copy-btn').addEventListener('click', async () => {
  const btn = $('copy-btn');
  btn.disabled = true;
  const html = activeTab === 'public' ? generatePublicHtml() : generateInnerHtml();
  const copied = await copyHtmlToClipboard(html);

  try {
    if (!copied) throw new Error('Copy failed');
    btn.classList.add('success');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Скопійовано — вставляй в Gmail!`;
  } catch {
    btn.innerHTML = `Натисни Ctrl+C`;
  }

  setTimeout(() => {
    btn.disabled = false;
    btn.classList.remove('success');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Скопіювати підпис`;
  }, 3000);
});

   Init
════════════════════════════════════════════ */
renderPreview();
</script>
